name: Build APK from uploaded archive

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Find and extract tar.gz file
        run: |
          TARFILE=$(find . -maxdepth 1 -name "*.tar.gz" | head -1)
          if [ -z "$TARFILE" ]; then
            echo "No .tar.gz file found in root!"
            exit 1
          fi
          echo "Found: $TARFILE"
          mkdir -p extracted
          tar -xzf "$TARFILE" -C extracted
          echo "Extraction done"
          ls extracted/

      - name: Find project root (with gradlew)
        run: |
          PROJECT_DIR=$(find extracted -name "gradlew" -type f | head -1 | xargs dirname)
          echo "Project root: $PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Make gradlew executable
        run: chmod +x "$PROJECT_DIR/gradlew"

      - name: Build Release APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m -Dorg.gradle.daemon=false"

      - name: Find APK
        run: |
          APK_PATH=$(find $PROJECT_DIR -name "*.apk" -path "*/release/*" | head -1)
          echo "APK found at: $APK_PATH"
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: WClient-Release-APK
          path: ${{ env.APK_PATH }}
          if-no-files-found: error
          retention-days: 30
