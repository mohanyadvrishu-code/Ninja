name: Build APK from uploaded archive

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Find and extract archive
        run: |
          TARFILE=$(find . -not -path './.git/*' \( -name "*.tar.gz" -o -name "*.tar" \) | head -1)
          if [ -z "$TARFILE" ]; then
            echo "ERROR: No archive file found!"
            exit 1
          fi
          echo "Found: $TARFILE"
          mkdir -p extracted
          tar -xf "$TARFILE" -C extracted

      - name: Find project root
        run: |
          PROJECT_DIR=$(find extracted -name "gradlew" -type f | head -1 | xargs dirname)
          echo "Project root: $PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: Patch settings.gradle.kts - add missing repos
        run: |
          SETTINGS="$PROJECT_DIR/settings.gradle.kts"
          sed -i 's|maven("https://repo.opencollab.dev/maven-releases")|maven("https://repo.opencollab.dev/maven-releases")\n        maven("https://maven.lenni0451.net/releases")\n        maven("https://maven.lenni0451.net/snapshots")\n        maven("https://jitpack.io")|' "$SETTINGS"
          echo "Settings patched"

      - name: Patch libs.versions.toml - fix MinecraftAuth version
        run: |
          VERSIONS="$PROJECT_DIR/gradle/libs.versions.toml"
          sed -i 's/minecraft-auth = "4.3.0"/minecraft-auth = "5.0.1"/' "$VERSIONS"
          echo "Version patched:"
          grep "minecraft-auth" "$VERSIONS"

      - name: Fix proguard - remove unsupported keepmessages
        run: |
          PROGUARD="$PROJECT_DIR/app/proguard-rules.pro"
          sed -i '/-keepmessages/d' "$PROGUARD"
          echo "Proguard fixed"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Make gradlew executable
        run: chmod +x "$PROJECT_DIR/gradlew"

      - name: Build Release APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: ./gradlew :app:assembleRelease --no-daemon --no-configuration-cache --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m -Dorg.gradle.daemon=false -Dorg.gradle.configuration-cache=false"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WClient-Release-APK
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30
