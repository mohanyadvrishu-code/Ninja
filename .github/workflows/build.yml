name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Find and extract archive
        run: |
          TARFILE=$(find . -not -path './.git/*' \( -name "*.tar.gz" -o -name "*.tar" \) | head -1)
          echo "Found: $TARFILE"
          mkdir -p extracted
          tar -xf "$TARFILE" -C extracted
          PROJECT_DIR=$(find extracted -name "gradlew" -type f | head -1 | xargs dirname)
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Build APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease --no-daemon --no-configuration-cache --no-parallel

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WClient-APK
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30
