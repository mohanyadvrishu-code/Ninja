name: Build APK from uploaded archive

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: List all files in repo (debug)
        run: |
          echo "=== All files in repo ==="
          find . -not -path './.git/*' | sort

      - name: Find archive file (tar.gz or tar)
        run: |
          echo "=== Searching for archive ==="
          TARFILE=$(find . -not -path './.git/*' \( -name "*.tar.gz" -o -name "*.tar" \) | head -1)
          if [ -z "$TARFILE" ]; then
            echo "ERROR: No archive file found in repo!"
            echo "Upload the WClient tar.gz file to the root of the repo."
            exit 1
          fi
          echo "Found: $TARFILE"
          echo "TARFILE=$TARFILE" >> $GITHUB_ENV

      - name: Extract archive
        run: |
          mkdir -p extracted
          tar -xf "$TARFILE" -C extracted
          echo "=== Extracted contents ==="
          ls extracted/

      - name: Find project root (with gradlew)
        run: |
          PROJECT_DIR=$(find extracted -name "gradlew" -type f | head -1 | xargs dirname)
          if [ -z "$PROJECT_DIR" ]; then
            echo "ERROR: gradlew not found inside archive!"
            exit 1
          fi
          echo "Project root: $PROJECT_DIR"
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper

      - name: Make gradlew executable
        run: chmod +x "$PROJECT_DIR/gradlew"

      - name: Build Release APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m -Dorg.gradle.daemon=false"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WClient-Release-APK
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30
